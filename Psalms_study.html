<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Psalms Study</title>
<link rel="stylesheet" href="cataloge_card_style.css">
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>


<div class="retro-container" style="width: 100%; max-width: 1000px; margin: auto;">

  <div style="font-size: 16px; margin-bottom: 8px; font-family: monospace;" id="status-label">
    Introduction
  </div>

  <div class="inset-box" style="padding: 5px; min-height: auto;">
    <div id="display-content"></div>
  </div>

  <fieldset class="inset-box" style="margin-top: 20px; padding: 10px">
    <legend style="font-size: 12px; padding: 0 5px; font-family: monospace; background: lightgrey">Notes & Commentary</legend>
    <p class="insight-box">

	  The Psalters often contain layers of meaning that aren't fully realized until later revelations by other inspired prophets. 
      Because all Scripture is Spirit-inspired and timeless, we can use later prophetic books to illuminate the depth of these ancient songs.
    </p>
  </fieldset>
    
  <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-top: 12px;">
    
    <div style="display: flex; align-items: center; gap: 8px;">
      <label style="font-size: 12px; font-weight: bold; font-family: monospace;">Jump to:</label>
<select id="psalm-select" class="retro-select"><option>Psalm 1</option></select>
<select id="verse-select" class="retro-select"><option>Verse 1</option></select>
<button id="go-btn" class="retro-btn" style="padding: 2px 8px;">Go</button>
    </div>

    <div style="display: flex; gap: 8px;">
      <button id="prev-btn" class="retro-btn" disabled> Back </button>
      <button id="next-btn" class="retro-btn" > Next </button>
      <button id="reading-mode-btn" class="retro-btn">Reading Mode: OFF</button>
    </div>

  </div>

</div>

<script src="psalms_data.js"></script>
<script>
  /* UI ELEMENT SELECTION */
  const genreTooltips = {
    "Individual Lament": "A direct cry to God in suffering — the most common genre in the Psalter. Lament is not faithlessness; it is the prayer of faith in the face of crisis.",
    "Communal Lament": "A corporate cry to God on behalf of the community in collective suffering.",
    "Hymn": "Direct praise of God for who He is — His character, power, and works in creation and history.",
    "Thanksgiving": "A psalm of gratitude for a specific, remembered act of deliverance — distinct from a hymn, which praises God in general. The psalmist looks back at a crisis God resolved and declares it publicly before the congregation.",
    "Royal": "A psalm concerning the king — his coronation, reign, or prayer. These psalms make claims that exceed any human ruler and find their full referent in Christ.",
    "Wisdom": "A psalm that teaches — the way of life, the contrast between righteous and wicked, and the fear of God as the foundation of understanding.",
    "Penitential": "A psalm of confession — the soul owning its sin before God and appealing to His mercy rather than any righteousness of its own.",
    "Song of Ascent": "One of Psalms 120–134, sung by pilgrims traveling up to Jerusalem for the three annual festivals.",
  };
  const parallelismTooltips = {
    "Synonymous": "The second line restates the first with different words or images — not repetition but deepening.",
    "Antithetic": "The second line contrasts the first. The meaning lives in the gap between the two halves.",
    "Synthetic": "The second line extends or completes the first — adding a result, a location, or carrying the thought forward.",
  };
  let currentIndex = 0;
  const nextBtn = document.getElementById('next-btn');
  const prevBtn = document.getElementById('prev-btn');
  const goBtn = document.getElementById('go-btn');
  const psalmSelect = document.getElementById('psalm-select'); // New selection
  const verseSelect = document.getElementById('verse-select');
  const display = document.getElementById('display-content');
  const statusText = document.getElementById('status-label');
  const insightText = document.querySelector('fieldset p');

  /**
   * 1. INITIALIZE NAVIGATION
   * Fills the Psalm dropdown and sets up the Verse listener
   */
  function initNavigation() {
    // Fill Psalm dropdown 1-150
    psalmSelect.innerHTML = '';
    for (let i = 1; i <= 150; i++) {
      let opt = document.createElement('option');
      opt.value = i;
      opt.innerHTML = `Psalm ${i}`;
      psalmSelect.appendChild(opt);
    }

    // Listen for Psalm changes to update available Verses
    psalmSelect.addEventListener('change', updateVerseOptions);
    
    // Set initial verses for Psalm 1
    updateVerseOptions();
  }

  /**
   * 2. UPDATE VERSE OPTIONS
   * Filters your data.js to find verses that match the chosen Psalm
   */
  function updateVerseOptions() {
    const selectedPsalm = psalmSelect.value;
    verseSelect.innerHTML = ''; // Clear old verses

    // Look through your data for labels starting with "Psalm X:"
    const availableVerses = psalmData.filter(v => v.label.startsWith(`Psalm ${selectedPsalm}:`));

    if (availableVerses.length > 0) {
      availableVerses.forEach(v => {
        const vNum = v.label.split(':')[1]; // Get "1" from "Psalm 1:1"
        let opt = document.createElement('option');
        opt.value = vNum;
        opt.innerHTML = `Verse ${vNum}`;
        verseSelect.appendChild(opt);
      });
    } else {
      let opt = document.createElement('option');
      opt.innerHTML = "No data yet";
      verseSelect.appendChild(opt);
    }
  }

  /**
   * 3. RENDER FUNCTION 
   */
  function renderVerse() {
    const v = psalmData[currentIndex];
    
    // Update Status Label
    statusText.innerText = v.label;
    
    // Update Content Window
    const genreBar = (v.genre || v.parallelism) ? `<div class="genre-bar">${v.genre ? `<span class="tooltip tooltip-down" style="cursor:default;">${v.genre}<span class="tooltiptext">${genreTooltips[v.genre] || ''}</span></span>` : ''}${v.genre && v.parallelism ? ' &nbsp;&#183;&nbsp; ' : ''}${v.parallelism ? `<span class="tooltip tooltip-down" style="cursor:default;">${v.parallelism}<span class="tooltiptext">${parallelismTooltips[v.parallelism] || ''}</span></span>` : ''}</div>` : '';
    display.innerHTML = `
      <div style="display: flex; justify-content: space-between; align-items: flex-end">
        <h2 class="verse-title">
          ${v.title}
        </h2>
        ${genreBar}
        ${v.image ? `<img src="${v.image}" height="70">` : '<div></div>'}
      </div>
      <hr class="retro-hr">
      <div class="verse-text-block">
        ${v.text}
      </div>
    `;

    // Update Insight Box
    insightText.innerHTML = v.insight;

    // Toggle Button Disabled States
    prevBtn.disabled = (currentIndex === 0);
    nextBtn.disabled = (currentIndex === psalmData.length - 1);
    nextBtn.textContent = (currentIndex === 0) ? 'Psalm 1 >>' : ' Next ';
  }

  /* BUTTON EVENT LISTENERS */

  nextBtn.addEventListener('click', () => {
    if (currentIndex < psalmData.length - 1) {
      currentIndex++;
      renderVerse();
    }
  });

  prevBtn.addEventListener('click', () => {
    if (currentIndex > 0) {
      currentIndex--;
      renderVerse();
    }
  });

  goBtn.addEventListener('click', () => {
    const pNum = psalmSelect.value;
    const vNum = verseSelect.value;
    const targetLabel = `Psalm ${pNum}:${vNum}`;

    const foundIndex = psalmData.findIndex(v => v.label === targetLabel);

    if (foundIndex !== -1) {
      currentIndex = foundIndex;
      renderVerse();
    } else {
      alert("This verse hasn't been added to your data file yet.");
    }
  });

  /* READING MODE TOGGLE */
  const readingModeBtn = document.getElementById('reading-mode-btn');
  const retroContainer = document.querySelector('.retro-container');

  function applyReadingMode(on) {
    retroContainer.classList.toggle('reading-mode', on);
    readingModeBtn.textContent = on ? 'Reading Mode: ON' : 'Reading Mode: OFF';
    localStorage.setItem('pp_reading_mode', on ? 'on' : 'off');
  }

  readingModeBtn.addEventListener('click', () => {
    applyReadingMode(!retroContainer.classList.contains('reading-mode'));
  });

  // START EVERYTHING
  initNavigation();
  renderVerse();
  applyReadingMode(localStorage.getItem('pp_reading_mode') === 'on');
</script>

</body>
</html>
